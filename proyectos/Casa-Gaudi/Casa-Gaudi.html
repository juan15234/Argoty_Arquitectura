<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Casa-Gaudi-style.css">
</head>
<body>

    <button class="volver" id="boton-volver" onclick="volver()">⬅️INICIO</button>
    <section class="mas-imagenes">
        <div class="barra-superior"> <h1>Casa Gaudi</h1></div>
        <div class="imagenes">
                <img src="../../imagenes/Imagenes para pagina/Proyectos residenciales/Casa-Gaudi/principal-1.jpg" alt="">
                <img src="../../imagenes/Imagenes para pagina/Proyectos residenciales/Casa-Gaudi/imagen-2.jpg" alt="">
        
                <img src="../../imagenes/Imagenes para pagina/Proyectos residenciales/Casa-Gaudi/imagen-3.jpg" alt="">
                <img src="../../imagenes/Imagenes para pagina/Proyectos residenciales/Casa-Gaudi/imagen-4.jpg" alt="">
        </div>
    </section>

    <script>
        function volver(){
            window.history.back();
        }

        const boton_volver = document.getElementById('boton-volver')

        if(innerWidth < 767){
            

                boton_volver.textContent = '⬅️'
            }else{
                boton_volver.textContent = '⬅️INICIO'
            }

        window.addEventListener('resize', ()=>{
            
            if(innerWidth < 767){
            

                boton_volver.textContent = '⬅️'
            }else{
                boton_volver.textContent = '⬅️INICIO'
            }
        })
    </script>

</body>
</html>
